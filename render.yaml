# Render Blueprint — deploys the app on a persistent-Node web service.
# In Render: New → Blueprint → pick this repo. It reads this file.
# After it deploys, set the secret env vars (marked sync:false) in the dashboard.
services:
  - type: web
    name: instaheadshotswithabird
    runtime: node
    plan: free                 # free = ephemeral disk (reviews + bird-count reset on restart).
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PROVIDER
        value: replicate
      - key: REPLICATE_API_TOKEN
        sync: false            # paste in dashboard
      - key: STRIPE_SECRET_KEY
        sync: false            # use your sk_test_... key for test mode
      - key: ADMIN_KEY
        sync: false            # any random string, for approving reviews
      - key: PUBLIC_URL
        sync: false            # set to your https://<service>.onrender.com URL after first deploy

# ── To keep reviews + bird-uniqueness across restarts (recommended for real beta) ──
# 1) change plan above to:  plan: starter
# 2) add this env var under envVars:
#      - key: DATA_DIR
#        value: /var/data
# 3) add a disk to the service:
#    disk:
#      name: data
#      mountPath: /var/data
#      sizeGB: 1
